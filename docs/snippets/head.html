<!-- Paste inside <head> of each page. Substitute all {{}} tokens. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{PAGE_TITLE}} — Hurricane Coast</title>
<meta name="description" content="{{META_DESCRIPTION}}">
<meta name="author" content="Michael Hendrick">
<link rel="canonical" href="https://hurricanecoast.me/{{CANONICAL_PATH}}">
<link rel="icon" href="{{ASSET_PATH}}assets/img/favicon.ico">
<link rel="icon" type="image/svg+xml" href="{{ASSET_PATH}}assets/img/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="{{ASSET_PATH}}assets/img/favicon-32.png">
<link rel="apple-touch-icon" href="{{ASSET_PATH}}assets/img/apple-touch-icon.png">

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:site_name" content="Hurricane Coast">
<meta property="og:title" content="{{PAGE_TITLE}}">
<meta property="og:description" content="{{META_DESCRIPTION}}">
<meta property="og:url" content="https://hurricanecoast.me/{{CANONICAL_PATH}}">
<meta property="og:image" content="https://hurricanecoast.me/assets/img/{{OG_IMAGE|og-default.png}}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{PAGE_TITLE}}">
<meta name="twitter:description" content="{{META_DESCRIPTION}}">
<meta name="twitter:image" content="https://hurricanecoast.me/assets/img/{{OG_IMAGE|og-default.png}}">
<meta name="twitter:image:alt" content="{{PAGE_TITLE}} on Hurricane Coast">

<!-- Styles — the Living Coast display and body fonts are self-hosted. -->
<link rel="stylesheet" href="{{ASSET_PATH}}assets/css/site.css">
<link rel="stylesheet" href="{{ASSET_PATH}}assets/css/living-coast.css">
<script defer src="{{ASSET_PATH}}assets/js/canonicalize-url.js"></script>

<!-- Cloudflare Web Analytics -->
<script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "ab045889ac1845719235f1f16e8f646f"}'></script>
<!-- End Cloudflare Web Analytics -->

<!-- JSON-LD — update type, breadcrumbs, and language per page -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://hurricanecoast.me/#organization",
      "name": "Hurricane Coast",
      "url": "https://hurricanecoast.me/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://hurricanecoast.me/assets/img/{{OG_IMAGE|og-default.png}}"
      }
    },
    {
      "@type": "Person",
      "@id": "https://hurricanecoast.me/about#author",
      "name": "Michael Hendrick",
      "url": "https://hurricanecoast.me/about"
    },
    {
      "@type": "WebSite",
      "@id": "https://hurricanecoast.me/#website",
      "name": "Hurricane Coast",
      "url": "https://hurricanecoast.me/",
      "inLanguage": "{{PAGE_LANGUAGE|en-US}}",
      "publisher": {
        "@id": "https://hurricanecoast.me/#organization"
      }
    },
    {
      "@type": "{{SCHEMA_TYPE|Article}}",
      "@id": "https://hurricanecoast.me/{{CANONICAL_PATH}}#page",
      "url": "https://hurricanecoast.me/{{CANONICAL_PATH}}",
      "name": "{{PAGE_TITLE}}",
      "headline": "{{PAGE_TITLE}}",
      "description": "{{META_DESCRIPTION}}",
      "inLanguage": "{{PAGE_LANGUAGE|en-US}}",
      "isPartOf": {
        "@id": "https://hurricanecoast.me/#website"
      },
      "author": {
        "@id": "https://hurricanecoast.me/about#author"
      },
      "publisher": {
        "@id": "https://hurricanecoast.me/#organization"
      },
      "dateModified": "{{DATE_MODIFIED|2026-06-18}}",
      "breadcrumb": {
        "@id": "https://hurricanecoast.me/{{CANONICAL_PATH}}#breadcrumb"
      }
    },
    {
      "@type": "BreadcrumbList",
      "@id": "https://hurricanecoast.me/{{CANONICAL_PATH}}#breadcrumb",
      "itemListElement": {{BREADCRUMB_JSON}}
    }
  ]
}
</script>
