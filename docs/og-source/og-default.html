<!doctype html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: #FBF8F2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center;
      padding: 60px;
      position: relative;
    }
    .domain {
      font-size: 24px;
      letter-spacing: 0.12em;
      color: #556270;
      text-transform: lowercase;
      margin-bottom: 28px;
      font-family: -apple-system, Arial, sans-serif;
      font-weight: 400;
    }
    h1 {
      font-size: 64px;
      color: #1F2A33;
      line-height: 1.1;
      font-weight: 700;
      max-width: 900px;
    }
    .tagline {
      margin-top: 24px;
      font-size: 26px;
      color: #556270;
      font-family: -apple-system, Arial, sans-serif;
      font-weight: 400;
    }
    .stripe {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: #C2742B;
    }
  </style>
</head>
<body>
  <div class="domain">Hurricane Coast</div>
  <h1>Be ready before the storm.</h1>
  <div class="tagline">Preparedness guides, checklists, and printables.</div>
  <div class="stripe"></div>
</body>
</html>
